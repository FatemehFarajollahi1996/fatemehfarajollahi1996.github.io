<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mobile App</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>

  <body>
    <header class="navWrap">
      <nav class="nav">
        <a class="brand" href="../index.html#top">Fatemeh</a>

        <div class="navLinks">
          <a class="navLink" href="../index.html#about">About me</a>
          <a class="navLink" href="../index.html#value">Value</a>
          <a class="navLink" href="../index.html#works">My works</a>
          <a class="navLink" href="../index.html#contact">Contact</a>
        </div>

        <a class="navCta" href="../index.html#contact">Let’s talk</a>
      </nav>
    </header>

    <main class="workPage">
      <div class="workContainer">
        <div class="backRow">
          <a class="btn ghost" href="../index.html#works">← Back to works</a>
        </div>

        <section class="workHero">
          <div class="workBody">
            <h1>Mobile UI Collection</h1>

            <div class="workMetaRow">
              <span class="workTag">UI Design</span>
              <span class="workTag">Mobile</span>
              <span class="workTag">Multiple Concepts</span>
            </div>

            <p class="workIntro">
              A collection of mobile UI concepts. Select a project below, then choose a screen to preview.
            </p>

            <!-- Project (Item) selector -->
            <div class="tabs" role="tablist" aria-label="Work 2 projects">
              <button class="tab is-active" type="button" data-project="car_design" aria-selected="true">
                Car design
              </button>
              <button class="tab" type="button" data-project="design_course" aria-selected="false">
                Design course
              </button>
              <button class="tab" type="button" data-project="business_management" aria-selected="false">
                Business management
              </button>
            
              <button class="tab" type="button" data-project="flight" aria-selected="false">
                Flight
              </button>
              <button class="tab" type="button" data-project="lino_app" aria-selected="false">
                LinoApp
              </button>
              <button class="tab" type="button" data-project="medizin" aria-selected="false">
                Medizin
              </button>
              <button class="tab" type="button" data-project="trx" aria-selected="false">
                TRX
              </button>
              <button class="tab" type="button" data-project="aktien" aria-selected="false">
                Aktien
              </button>
              <button class="tab" type="button" data-project="transfer" aria-selected="false">
                Transfer
              </button>
              <button class="tab" type="button" data-project="trip" aria-selected="false">
                Trip
              </button>
            </div>

            <div class="sectionDivider"></div>

            <!-- Screen selector (generated by JS) -->
            <div class="tabs tabs--sub" role="tablist" aria-label="Project screens" id="screenTabs"></div>

            <!-- Selected screen -->
            <div class="tabPanels">
              <section class="tabPanel is-active" role="tabpanel" aria-label="Selected screen">
                <img
                  id="mainImage"
                  class="workImgFull"
                  src=""
                  alt="Selected screen"
                  loading="lazy"
                />
              </section>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script>
      // Folder: assets/works/work-2/

      const BASE = "../assets/works/work-2/";

      const PROJECTS = {
        car_design: {
          title: "Car design",
          screens: [
            { label: "Screen 1", file: "car_design_1.png" }
          ]
        },

        design_course: {
          title: "Design course",
          screens: [
            { label: "Screen 1", file: "design_course_1.png" },
            { label: "Screen 2", file: "design_course_2.png" },
          ]
        },

        business_management: {
          title: "Business management",
          screens: [
            { label: "Screen 1", file: "business_management_1.png" },
            { label: "Screen 2", file: "business_management_2.png" }
          ]
        },

        flight: {
          title: "Flight",
          screens: [
            { label: "Screen 1", file: "flight_1.png" }
          ]
        },

        lino_app: {
          title: "LinoApp",
          screens: [
            { label: "Screen 1", file: "lino_app_1.png" }
          ]
        },

        medizin: {
          title: "Medizin",
          screens: [
            { label: "Screen 1", file: "medizin_1.png" },
            { label: "Screen 2", file: "medizin_2.png" }
          ]
        },

        trx: {
          title: "TRX",
          screens: [
            { label: "Screen 1", file: "trx_1.png" },
            { label: "Screen 2", file: "trx_2.png" },
            { label: "Screen 3", file: "trx_3.png" }
          ]
        },

        aktien: {
          title: "Aktien (بورس)",
          screens: [
            { label: "Screen 1", file: "aktien_1.png" }
          ]
        },

        transfer: {
          title: "Transfer",
          screens: [
            { label: "Screen 1", file: "transfer_1.png" }
          ]
        },

        trip: {
          title: "Trip",
          screens: [
            { label: "Screen 1", file: "trip_1.png" },
            { label: "Screen 2", file: "trip_2.png" },
            { label: "Screen 3", file: "trip_3.png" },
            { label: "Screen 4", file: "trip_4.png" },
            { label: "Screen 5", file: "trip_5.png" },
            { label: "Screen 6", file: "trip_6.png" },
            { label: "Screen 7", file: "trip_7.png" },
            { label: "Screen 8", file: "trip_8.png" }
          ]
        }
      };

      const projectTabs = Array.from(document.querySelectorAll('[data-project]'));
      const screenTabsEl = document.getElementById("screenTabs");
      const mainImage = document.getElementById("mainImage");

      let currentProject = "car_design";
      let currentScreenIndex = 0;

      function setMainImage(file) {
        mainImage.src = BASE + file;
      }

      function renderScreenTabs(projectKey) {
        const project = PROJECTS[projectKey];
        if (!project) return;

        screenTabsEl.innerHTML = "";

        project.screens.forEach((s, idx) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "tab" + (idx === 0 ? " is-active" : "");
          btn.setAttribute("role", "tab");
          btn.setAttribute("aria-selected", idx === 0 ? "true" : "false");
          btn.textContent = s.label;

          btn.addEventListener("click", () => {
            Array.from(screenTabsEl.querySelectorAll(".tab")).forEach((t) => {
              t.classList.remove("is-active");
              t.setAttribute("aria-selected", "false");
            });
            btn.classList.add("is-active");
            btn.setAttribute("aria-selected", "true");

            currentScreenIndex = idx;
            setMainImage(project.screens[idx].file);
          });

          screenTabsEl.appendChild(btn);
        });

        currentScreenIndex = 0;
        setMainImage(project.screens[0].file);
      }

      function activateProject(projectKey) {
        currentProject = projectKey;

        projectTabs.forEach((t) => {
          const isOn = t.dataset.project === projectKey;
          t.classList.toggle("is-active", isOn);
          t.setAttribute("aria-selected", isOn ? "true" : "false");
        });

        renderScreenTabs(projectKey);
      }

      projectTabs.forEach((btn) => {
        btn.addEventListener("click", () => activateProject(btn.dataset.project));
      });

      // init
      activateProject(currentProject);
    </script>
  </body>
</html>
